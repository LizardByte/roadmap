---
name: Issue labeler
permissions: {}

on:
  issues:
    types:
      - opened
      - edited
      - reopened

jobs:
  label-component:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Parse issue form
        uses: stefanbuck/github-issue-parser@cb6e97157cbf851e3a393ff8d57c93a484cc323f  # v3.2.5
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/roadmap.yml

      - name: Set repository labels
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e  # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: _repositories
          token: ${{ secrets.GH_BOT_TOKEN }}

      - name: Set stack labels
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e  # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: stack
          token: ${{ secrets.GH_BOT_TOKEN }}

      - name: Set effort labels
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e  # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: effort
          token: ${{ secrets.GH_BOT_TOKEN }}

      - name: Set priority labels
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e  # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: priority
          token: ${{ secrets.GH_BOT_TOKEN }}

      - name: Set milestone labels
        uses: redhat-plumbers-in-action/advanced-issue-labeler@b80ae64e3e156e9c111b075bfa04b295d54e8e2e  # v3.2.4
        with:
          issue-form: ${{ steps.issue-parser.outputs.jsonString }}
          section: milestone
          token: ${{ secrets.GH_BOT_TOKEN }}
